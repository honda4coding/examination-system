<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Exam System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="home.html">
                <i class="bi bi-journal-bookmark-fill"></i> Exam System
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="register.html">Register</a>
            </div>
        </div>
    </nav>

   
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-box-arrow-in-right text-primary display-1"></i>
                            <h2 class="mt-3">Welcome Back</h2>
                            <p class="text-secondary">Sign in to continue your exam</p>
                        </div>
                        
                        <form id="signinForm" novalidate>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="name@example.com">
                                <div class="invalid-feedback" id="emailError"></div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Enter your password">
                                <div class="invalid-feedback" id="passwordError"></div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-3 mb-3">
                                <i class="bi bi-box-arrow-in-right"></i> Sign In
                            </button>
                            
                            <p class="text-center mb-0">
                                Don't have an account? 
                                <a href="./register.html" class="text-primary text-decoration-none">Register here</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

  
  
    <script src="js/signin.js"></script>
</body>
</html>
