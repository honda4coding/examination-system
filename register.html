<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Exam System</title>
    
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
   
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="home.html">
                <i class="bi bi-journal-bookmark-fill"></i> Exam System
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="signin.html">Sign In</a>
            </div>
        </div>
    </nav>

   
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-person-plus-fill text-primary display-1"></i>
                            <h2 class="mt-3">Create New Account</h2>
                            <p class="text-secondary">Join us to start your exam</p>
                        </div>
                        
                        <form id="registerForm" novalidate>
                            
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label for="firstName" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstName" placeholder="Enter first name">
                                    <div class="invalid-feedback" id="firstNameError"></div>
                                </div>
                                <div class="col-md-6">
                                    <label for="lastName" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" placeholder="Enter last name">
                                    <div class="invalid-feedback" id="lastNameError"></div>
                                </div>
                            </div>
                            
                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="name@example.com">
                                <div class="invalid-feedback" id="emailError"></div>
                            </div>
                            
                            <!-- Password -->
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Create password">
                                <div class="form-text">Must be at least 8 characters</div>
                                <div class="invalid-feedback" id="passwordError"></div>
                            </div>
                            
                            <!-- Confirm Password -->
                            <div class="mb-4">
                                <label for="rePassword" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="rePassword" placeholder="Re-enter password">
                                <div class="invalid-feedback" id="rePasswordError"></div>
                            </div>
                            
                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-primary w-100 py-3 mb-3">
                                <i class="bi bi-person-plus"></i> Register
                            </button>
                            
                            <!-- Login Link -->
                            <p class="text-center mb-0">
                                Already have an account? 
                                <a href="./signin.html" class="text-primary text-decoration-none">Sign in</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
    <script src="js/register.js"></script>
</body>
</html>
