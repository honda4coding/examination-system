<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }

        .result-card {
            text-align: center;
            padding: 3rem;
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
        }

        #result-title { font-size: 3.5rem; font-weight: 800; }
        #result-score { font-size: 2.5rem; font-weight: 700; }
        #result-name  { font-size: 1.25rem; }
        #btn-retry    { cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="result-card" class="card p-4 shadow border-2">
    <h2 id="result-title"></h2>
    <p id="result-name"></p>
    <h4>Score: <span id="result-score"></span></h4>
    <a href="exam.html" class="btn btn-primary">Try Again</a>
</div>
<script src="./js/result.js"></script>
</body>
</html>
