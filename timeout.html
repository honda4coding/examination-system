<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Out</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0 text-center p-5">
                    
                    <div class="display-1 text-danger mb-4">
                    </div>

                    <h1 class="text-danger fw-bold">Time's Up!</h1>
                    
                    <h4 id="user-greeting" class="text-secondary mb-4">Your time is over!</h4>

                    <div class="bg-light rounded p-4 mb-4">
                        <p class="mb-1 text-muted">Your Score</p>
                        <h1 class="display-4 fw-bold text-dark" id="final-score">0 / 0</h1>
                    </div>

                    <div class="d-grid gap-2">
                        <button onclick="window.location.href='home.html'" class="btn btn-outline-primary btn-lg">
                            <i class="bi bi-house-door"></i> Home
                        </button>
                        <button onclick="logout()" class="btn btn-danger">
                            <i class="bi bi-box-arrow-left"></i> Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/timeout.js"></script>
</body>
</html>
